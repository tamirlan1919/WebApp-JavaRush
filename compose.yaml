version: "3.9"

services:
  db:
    image: postgres:15
    environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
        POSTGRES_DB: mydb
    ports:
    - "5434:5432"
    volumes:
    - db_data:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0:8000
    volumes:
    - .:/app

    ports:
    - "8000:8000"

    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/mydb

    depends_on:
      - db

volumes:
    db_data: